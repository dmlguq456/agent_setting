# adapters/claude/config/models.conf
# Claude adapter — the SOLE declaration of concrete Claude model IDs and default
# efforts. model-map.sh, agent frontmatter generation, mem-distill-worker.sh, and
# the README/ADAPTATION model tables all derive from this file. A concrete model
# ID outside this file (and generated regions) is a fail-closed guard violation
# (tools/check-model-config.sh).
#
# Runtime env vars still override (CLAUDE_MODEL_DEEP/BALANCED,
# CLAUDE_EFFORT_DEEP/BALANCED, CLAUDE_MEM_DISTILL_MODEL*); this file is the
# default source. Model names use Claude short aliases (fable/opus/sonnet/haiku).
# Tuning preference: prefer changing an effort tier over swapping a model tier.

# Interactive-main-only models are telemetry-visible but ineligible for every
# registered headless/native delegated worker surface. Consumers must reject
# explicit or inherited selection rather than silently remap it.
CFG_MAIN_SESSION_ONLY_MODELS="fable"

# --- Tiers: concrete model + default effort ---
# --- Deep effort ladder (user 2026-07-22): default xhigh; step-down = high;
#     medium = EXCEPTIONAL, genuinely easy work only (wrapper prints a caution);
#     hardest work steps UP to max (probe-verified on this engine). ---
CFG_TIER_DEEP_MODEL=opus
CFG_TIER_DEEP_EFFORT=xhigh
CFG_TIER_LIGHT_MODEL=sonnet
CFG_TIER_LIGHT_EFFORT=high
CFG_TIER_MINI_MODEL=haiku
CFG_TIER_MINI_EFFORT=medium

# --- deep-tier capacity failover (model-granularity). A rate-limited model does
#     not recover by lowering effort, so the dispatch-eligible cascade switches
#     MODEL: opus -> sonnet. Fable is interactive-main-only and never appears.
#     Each step carries its own paired effort.
#     Consumed by SD-59 (utilities/stage-dispatch-fallback.py capacity_cascade_next)
#     when a dispatch worker dies dead-capacity and no explicit --capacity-model
#     is passed. Effort-first (quality tuning) is separate from this. ---
CFG_TIER_DEEP_FAILOVER=light
CFG_TIER_DEEP_FAILOVER_CASCADE="opus:xhigh sonnet:high"

# --- Lifecycle helper tiers ---
CFG_LIFECYCLE_NUDGE=mini      # turn-nudge / increment distill (haiku)
CFG_LIFECYCLE_CURATE=light    # session-end curate distill (sonnet)

# --- Native subagent default tier (Agent/Task tool spawns) ---
# Native subagents no longer silently inherit the interactive session model:
# hooks/subagent-model-default.sh (PreToolUse Agent|Task) injects this tier's
# model into tool_input. An explicit eligible per-invocation model or eligible
# agent-definition pin wins. Fork/inherit selection and every model named by
# CFG_MAIN_SESSION_ONLY_MODELS are denied before spawn. Runtime env
# CLAUDE_NATIVE_SUBAGENT_MODEL=<eligible-alias> may force another injected model.
CFG_NATIVE_SUBAGENT=light

# --- Role -> tier grouping (Claude's existing grouping; model-map.sh keeps the
#     same case routing). Note: differs from codex on purpose — Claude's
#     external adversary is a light wrapper that invokes the external engine. ---
CFG_ROLES_DEEP="deep maker|deep reviewer|deep editor|deep orchestrator"
CFG_ROLES_LIGHT="fast implementer|fast reviewer|fast fact checker|fast writer|fast tool worker|orchestrator|external adversary|external adversary orchestrator"
