# adapters/codex/config/models.conf
# Codex adapter — the SOLE declaration of concrete Codex model IDs and default
# reasoning efforts. model-map.sh, sync-native-agents.py, agents/*.toml,
# distill-worker.sh, and the README/ADAPTATION model tables all derive from this
# file. A concrete model ID that appears outside this file (and generated
# regions) is a fail-closed guard violation (tools/check-model-config.sh).
#
# Runtime env vars still override (CODEX_MODEL_SOL/LUNA/BALANCED,
# CODEX_REASONING_*); this file is the default source, not a hard pin.
# Format: POSIX-sh-sourceable flat KEY=value — sourced by sh, parsed by python.
# Tuning preference: prefer changing an effort tier over swapping a model tier.

# --- Tiers: concrete model + default reasoning effort ---
CFG_TIER_DEEP_MODEL=gpt-5.6-sol
CFG_TIER_DEEP_EFFORT=xhigh
CFG_TIER_LIGHT_MODEL=gpt-5.6-luna
CFG_TIER_LIGHT_EFFORT=medium
CFG_TIER_MINI_MODEL=gpt-5.4-mini
CFG_TIER_MINI_EFFORT=low

# --- Per-role effort override (model comes from the role's tier) ---
# fast implementer runs on the deep model but at medium effort (effort-first).
CFG_ROLE_FAST_IMPLEMENTER_EFFORT=medium

# --- deep-tier capacity failover (model-granularity): SOL exhausted -> LUNA.
#     Consumed by SD-59 capacity_cascade_next when no explicit --capacity-model. ---
CFG_TIER_DEEP_FAILOVER=light
CFG_TIER_DEEP_FAILOVER_CASCADE="gpt-5.6-sol:xhigh gpt-5.6-luna:medium"

# --- Lifecycle helper tiers ---
CFG_LIFECYCLE_NUDGE=mini      # turn-nudge / increment distill
CFG_LIFECYCLE_CURATE=light    # session-end curate distill

# --- Role -> tier grouping (consumed by sync-native-agents.py; model-map.sh
#     keeps the same grouping in its case routing). Pipe-separated role names. ---
CFG_ROLES_DEEP="deep maker|deep reviewer|deep editor|deep orchestrator|external adversary|fast implementer"
CFG_ROLES_LIGHT="orchestrator|external adversary orchestrator|fast reviewer|fast fact checker|fast writer|fast tool worker"

# --- Native agent profiles: tier:effort:sandbox (sync-native-agents.py derives
#     the concrete model from the tier; effort/sandbox are per-profile). ---
CFG_PROFILE_PLAN_TEAM=deep:high:workspace-write
CFG_PROFILE_DEV_TEAM=deep:medium:workspace-write
CFG_PROFILE_QA_TEAM=light:medium:read-only
CFG_PROFILE_RESEARCH_TEAM=deep:high:workspace-write
CFG_PROFILE_MATERIAL_TEAM=light:low:workspace-write
CFG_PROFILE_DESIGN_TEAM=deep:high:workspace-write
CFG_PROFILE_EDITORIAL_TEAM=deep:high:workspace-write
CFG_PROFILE_EXTERNAL_ADVERSARY=deep:high:read-only
CFG_PROFILE_MEMORY_SCOUT=light:low:read-only
CFG_PROFILE_DEFAULT=light:medium:workspace-write
