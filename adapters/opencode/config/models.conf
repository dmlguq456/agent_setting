# adapters/opencode/config/models.conf
# OpenCode adapter — the SOLE declaration of concrete OpenCode model IDs
# (provider/model-id) and variants. role-map.sh derives from this file. A
# concrete model ID outside this file (and generated regions) is a fail-closed
# guard violation (tools/check-model-config.sh).
#
# Runtime env vars still override (AGENT_MODEL_FAST/BALANCED/DEEP,
# AGENT_VARIANT_*); this file is the default source. OpenCode uses a
# provider/model-id string plus a variant field (no numeric reasoning effort).
# Verified against the local opencode-go provider registry (opencode 1.17.13).
# Tuning preference: prefer changing an effort/variant tier over a model tier.

# --- Tiers: concrete provider/model-id + variant ---
CFG_TIER_DEEP_MODEL=opencode-go/glm-5.2
CFG_TIER_DEEP_VARIANT=runtime-default
CFG_TIER_LIGHT_MODEL=opencode-go/deepseek-v4-pro
CFG_TIER_LIGHT_VARIANT=runtime-default
CFG_TIER_MINI_MODEL=opencode-go/deepseek-v4-flash
CFG_TIER_MINI_VARIANT=runtime-default

# --- deep-tier capacity failover (model-granularity): glm-5.2 exhausted ->
#     deepseek-v4-pro. Consumed by SD-59 capacity_cascade_next. ---
CFG_TIER_DEEP_FAILOVER=light
CFG_TIER_DEEP_FAILOVER_CASCADE="opencode-go/glm-5.2:runtime-default opencode-go/deepseek-v4-pro:runtime-default"

# --- OpenCode bucket -> tier mapping (role-map.sh case routing):
#     deep bucket = deep tier, balanced bucket = light tier, fast bucket = mini tier. ---
