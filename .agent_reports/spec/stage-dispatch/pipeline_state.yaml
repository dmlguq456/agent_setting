  - 'SD-44: Tracking = 다섯째 독립 축 — tracked는 산출물 계약만 결정, 분사는 promotion(SD-35)/separability(SD-17) 신호가 결정. tracked→escalation 결합 문구 제거. quick 경계 현행 유지(애매하면 quick depth-1 — 사용자 (a), 2026-07-15). 선택 근거 route record 기록 (v10, 진단 D1)'
  - 'SD-45: worker manifest-consumer 계약 — worker는 capability/intensity/topology 재선택 금지, route record hash 검증 + 배정 node scope 실행 + 증거 반환만. tracked gate 증거 4종(spec-read·drift verdict·mode·guard 전제)을 record 필수 필드로 운반. bootstrap 재실행은 record 검증+안전 확인 전용으로 축소, 3어댑터 동형 (v10, 진단 D2+F3)'
  - 'SD-46: guard↔topology 정합성 validator — spec/** write 선언 node는 sole-update-path 소유자이거나 conductor 선보장 gate 필요(fail-closed). runtime guard 차단은 structured failure + route record 참조 (v10, 진단 D3)'
  - 'SD-47: 공유 tracked 표면 병렬 계약 — spec 3-file transaction과 versions/v{N} 체인은 §5.8 lock 보유 중에만 원자 시퀀스로. 경합 = 대기 후 최신 재독·다음 버전(재시도 금지, 동일 v{N} 이중 snapshot 차단). spec-touch 선언 + §5.9 가드 선실행 (v10, 진단 D4)'
  - 'SD-48: nested child-spawn eligibility는 (parent harness/transport/sandbox, child harness, launch authority)별 checked hard eligibility. root headless/native subagent 지원으로 추정 금지; unsupported/unknown이면 eligible conductor 또는 prebound ancestor broker/fallback을 route에 결합 (v11, I1)'
  - 'SD-49: production registered dispatch의 모든 실제 launch attempt는 inherited canonical global registry에 spawn 전 기록. cycle-local은 audit mirror만; noncanonical child --jobs/global unwritable은 fail-closed, legacy local rows는 idempotent reconcile (v11, I2 원인=explicit local --jobs)'
  - 'SD-50: standard+ stage fallback = same-harness headless → cross-harness headless(필요 시 depth-0 launch broker) → native subagent → inline enum+evidence. 동일 failure class 무변경 재시도와 cross-harness hop 생략 금지 (v11, I3)'
  - 'SD-51: 모든 logical depth-2 headless launch의 표준 OS authority는 depth-0 deterministic broker. conductor는 target harness와 무관하게 declarative request+same-turn wait만 수행하며 logical depth/parent와 OS ancestry를 분리 (v12)'
  - 'SD-52: broker request는 versioned declarative envelope, canonical endpoint/jobs, atomic queued→claimed→running→terminal state, request idempotency, PID/start-tick+heartbeat/lease+fencing, attempt reconciliation을 강제. missing/stale broker는 caller-local fallback 없이 fail-closed (v12)'
  - 'SD-53: Claude→Claude, Claude→Codex, Codex→Claude, Codex→Codex가 동일 broker protocol을 사용. route layer가 fallback 후보를 선택하고 broker는 재라우팅하지 않으며 runtime recursion은 optional checked executor일 뿐 portable 전제가 아님 (v12)'
  - 'SD-54: broker request 접수·검증·claim은 short critical section, target 실행 생애는 전역 락 비보유 — request 병렬 실행. request_id 직렬화는 per-request lease/status로; 동시성 상한은 SD-40 governor 소유 유지 (v13, HOL 해소)'
  - 'SD-55: route record dispatch_evidence는 stable broker_root만 고정(broker_contract_version 2); mutable instance는 hop 시점 ensure로 해석. v1 record는 소급 없이 기존 열화 거동 유지 (v13)'
  - 'SD-56: 스테이지 통과 판정 직후 capability-route.py complete 의무 호출 — canonical <agent-home>/.dispatch/completion/<route_id>/<node_id>.json, 후속 노드 --start는 선행 marker gate(fail-closed). marker 부재=무주장 (v13)'
  - 'SD-57: broker 생존 판정 = 증거 위계(exact /proc 일치 > ticks 불일치=확정 사망 > /proc 부재=unverifiable → flock 프로브(획득=사망/거부=생존) → fenced ping+fresh heartbeat). status/request/stop/ensure 공통, 종료 대기는 state=stopped/lock 해제 관찰. request는 socket 우선 + durable file-spool fallback(동일 envelope/idempotency/fencing, transport≠authority). 양성 증거 없는 live 합성 금지 (v14, 진단 1)'
  - 'SD-58: liveness 증거 = 결정론 신호만(파일 write·tool-call/registry 전이·단계 heartbeat), progress 발화 불인정. deadline 내 첫 write 부재=경고, 2연속 무진행=자동 interrupt+SD-50 fallback. native hop은 child 생성 실증 없으면 실패로 닫음(O5 흡수) (v14, 진단 2 — 구현 후속)'
  - 'SD-59: capacity failure class 감지 → dead-capacity 즉시 마감(SD-15 확장) → 동일 prompt/ownership 유지 대체 모델/inheritance profile 1회 자동 재시도 → 재실패 시 SD-50 하강. 직전 capacity 모델 route-node cooldown, 모델 선택 주체는 orchestrator/route layer 유지 (v14, 진단 3 — 구현 후속)'
  - 'SD-60: registry 자동 reconcile(죽은 exact PID·병합 branch·stale row 구분, SD-29/49 안전 게이트 재사용, F-25와 단일 분류 소스) + 현재 session/route 필터 상태 출력 (v14, 진단 7 — 구현 후속)'
  - 'SD-64: conductor 고아 파이프라인 결정론 감지(attempt 사망∧completion marker 미완∧자식/후속 잔존, F-25/SD-58 단일 소스)·SD-60 확장 자동 표기·depth-0 표면 노출. 재개는 record+marker에서 결정론화, 재분사 여부는 depth-0 의미 판단. Stop-hook은 held 유지(사후 감지로 이동) (v15 minor #1)'
  - 'SD-65: post-execute 노드 HEAD 검증 = source_commit 자신 또는 후손(같은 route cwd·first-parent), 이전 노드는 정확 일치 유지. 발산·무관 HEAD·merge 상태 fail-closed 불변 (v15 minor #1)'
decisions_open:
  - 'SD-OPEN-1: 마이크로-스테이지 inline 손익 임계(어느 스테이지 크기부터 분사 이득). Phase 1 pilot 1표본 확보 — Phase 2 계측 누적만, 확정은 표본 축적 후'
  - 'SD-OPEN-2: 스테이지 SessionEnd mem curator 기동 영향 — 관찰만(계측 로그 기록), 개입은 증거 후 (v2)'
  - 'SD-OPEN-3: 상호보완 라우팅 가중 정책 — 초기 ''limit 회피 > 특성 적합 > 분산'' + 한도 비대칭 기본값(Claude>Codex, 가변 — 설정값으로 선언, 하드코드 금지), 편중·교차 리뷰 효과 계측 후 조정 (v3)'
  - 'O3/v14 후보(이월): route compiler input digest 자기수정 경합 — orchestrator override vs digest pin+drift record 비교'
  - 'O4/v14 후보: resource-runner canonical registry 경로 확정 (fleet 과정-뷰 F-28c 재개 조건)'
  - 'O5: v14 SD-58에 흡수 완료(2026-07-16) — native hop은 child 생성 실증(row/pid/산출물) 없으면 실패로 닫음'
