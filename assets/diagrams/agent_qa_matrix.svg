<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1.5" dy="2.2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1180" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="44" font-size="22" font-weight="bold" fill="#1a1a1a">G3 · skill → agent 호출 매트릭스 + QA gate</text>
  <text x="40" y="68" font-size="13" fill="#555">행 = 13 orchestrator skill / 열 = 8 agent · 셀 채움 = 호출 (진함 ● 자동, 옅음 ○ 옵션) · 화살표 없음</text>

  <!-- ===================== Geometry ===================== -->
  <!-- row label column: x 40..250 ; matrix cols start at 270 -->
  <!-- 8 agent columns, each 60 wide -->
  <!-- header band y 96..190 (rotated labels) ; rows start y 198, height 34 -->

  <!-- column header band -->
  <!-- agent columns: x = 270 + i*60 -->
  <!-- 자료팀 디자인팀 연구팀 편집팀 기획팀 개발팀 품질관리팀 codex -->
  <g font-size="12" fill="#1a1a1a">
    <text transform="translate(300,184) rotate(-55)" text-anchor="start">자료팀</text>
    <text transform="translate(360,184) rotate(-55)" text-anchor="start">디자인팀</text>
    <text transform="translate(420,184) rotate(-55)" text-anchor="start" fill="#7a3da0" font-weight="bold">연구팀</text>
    <text transform="translate(480,184) rotate(-55)" text-anchor="start">편집팀</text>
    <text transform="translate(540,184) rotate(-55)" text-anchor="start">기획팀</text>
    <text transform="translate(600,184) rotate(-55)" text-anchor="start" fill="#548235">개발팀</text>
    <text transform="translate(660,184) rotate(-55)" text-anchor="start" fill="#C00000" font-weight="bold">품질관리팀</text>
    <text transform="translate(720,184) rotate(-55)" text-anchor="start">codex*</text>
  </g>

  <!-- QA column header -->
  <text x="785" y="178" font-size="12" fill="#1a1a1a" transform="rotate(-55 785 178)">default QA</text>

  <!-- ===================== Matrix grid ===================== -->
  <!-- vertical guide lines (light) -->
  <g stroke="#e3e3e3" stroke-width="1">
    <!-- row separators 198 .. 198+13*34=640 -->
    <line x1="270" y1="198" x2="750" y2="198"/>
    <line x1="270" y1="232" x2="750" y2="232"/>
    <line x1="270" y1="266" x2="750" y2="266"/>
    <line x1="270" y1="300" x2="750" y2="300"/>
    <line x1="270" y1="334" x2="750" y2="334"/>
    <line x1="270" y1="368" x2="750" y2="368"/>
    <line x1="270" y1="402" x2="750" y2="402"/>
    <line x1="270" y1="436" x2="750" y2="436"/>
    <line x1="270" y1="470" x2="750" y2="470"/>
    <line x1="270" y1="504" x2="750" y2="504"/>
    <line x1="270" y1="538" x2="750" y2="538"/>
    <line x1="270" y1="572" x2="750" y2="572"/>
    <line x1="270" y1="606" x2="750" y2="606"/>
    <line x1="270" y1="640" x2="750" y2="640"/>
  </g>
  <g stroke="#e3e3e3" stroke-width="1">
    <line x1="270" y1="198" x2="270" y2="640"/>
    <line x1="330" y1="198" x2="330" y2="640"/>
    <line x1="390" y1="198" x2="390" y2="640"/>
    <line x1="450" y1="198" x2="450" y2="640"/>
    <line x1="510" y1="198" x2="510" y2="640"/>
    <line x1="570" y1="198" x2="570" y2="640"/>
    <line x1="630" y1="198" x2="630" y2="640"/>
    <line x1="690" y1="198" x2="690" y2="640"/>
    <line x1="750" y1="198" x2="750" y2="640"/>
  </g>

  <!-- hub column shading (연구팀 col x300, 품질관리팀 col x660) -->
  <rect x="390" y="198" width="60" height="442" fill="#C00000" opacity="0.05"/>
  <rect x="630" y="198" width="60" height="442" fill="#C00000" opacity="0.05"/>

  <!-- ===================== Row labels ===================== -->
  <!-- ceremony 큰 6 명시 = bold ; others normal -->
  <g font-size="13" fill="#1a1a1a" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
    <text x="44" y="220" font-weight="normal">analyze-project</text>
    <text x="44" y="254" font-weight="bold">analyze-user</text>
    <text x="44" y="288" font-weight="bold">autopilot-research</text>
    <text x="44" y="322" font-weight="normal">autopilot-spec</text>
    <text x="44" y="356" font-weight="bold">autopilot-code</text>
    <text x="44" y="390" font-weight="normal">autopilot-lab</text>
    <text x="44" y="424" font-weight="bold">autopilot-draft</text>
    <text x="44" y="458" font-weight="bold">autopilot-apply</text>
    <text x="44" y="492" font-weight="bold">autopilot-refine</text>
    <text x="44" y="526" font-weight="normal">autopilot-design</text>
    <text x="44" y="560" font-weight="normal">autopilot-ship</text>
    <text x="44" y="594" font-weight="normal">audit</text>
    <text x="44" y="628" font-weight="normal">notes</text>
  </g>

  <!-- ===================== Cells ===================== -->
  <!-- col centers: 자료300 디자360 연구420 편집480 기획540 개발600 품질660 codex720 -->
  <!-- row centers: 215 249 283 317 351 385 419 453 487 521 555 589 623 -->
  <!-- ● 자동 = filled square r=9 ; ○ 옵션 = ring -->

  <!-- helper styles via repeated rect/circle -->
  <!-- analyze-project (row1 c=215): 연구● 품질○ -->
  <rect x="411" y="206" width="18" height="18" rx="3" fill="#7a3da0"/>
  <circle cx="660" cy="215" r="9" fill="none" stroke="#C00000" stroke-width="1.6"/>

  <!-- analyze-user (row2 249): codex● -->
  <rect x="711" y="240" width="18" height="18" rx="3" fill="#C00000"/>

  <!-- autopilot-research (row3 283): 자료○ 연구● codex○ -->
  <circle cx="300" cy="283" r="9" fill="none" stroke="#FFC000" stroke-width="1.6"/>
  <rect x="411" y="274" width="18" height="18" rx="3" fill="#7a3da0"/>
  <circle cx="720" cy="283" r="9" fill="none" stroke="#C00000" stroke-width="1.6"/>

  <!-- autopilot-spec (row4 317): 디자○ 기획○ 개발● codex○ -->
  <circle cx="360" cy="317" r="9" fill="none" stroke="#c0508f" stroke-width="1.6"/>
  <circle cx="540" cy="317" r="9" fill="none" stroke="#4472C4" stroke-width="1.6"/>
  <rect x="591" y="308" width="18" height="18" rx="3" fill="#548235"/>
  <circle cx="720" cy="317" r="9" fill="none" stroke="#C00000" stroke-width="1.6"/>

  <!-- autopilot-code (row5 351): 디자○ 연구● 편집● 기획● 개발○ 품질● codex○ -->
  <circle cx="360" cy="351" r="9" fill="none" stroke="#c0508f" stroke-width="1.6"/>
  <rect x="411" y="342" width="18" height="18" rx="3" fill="#7a3da0"/>
  <rect x="471" y="342" width="18" height="18" rx="3" fill="#1f8f8f"/>
  <rect x="531" y="342" width="18" height="18" rx="3" fill="#4472C4"/>
  <circle cx="600" cy="351" r="9" fill="none" stroke="#548235" stroke-width="1.6"/>
  <rect x="651" y="342" width="18" height="18" rx="3" fill="#C00000"/>
  <circle cx="720" cy="351" r="9" fill="none" stroke="#C00000" stroke-width="1.6"/>

  <!-- autopilot-lab (row6 385): 자료○ 개발● 품질○ codex○ -->
  <circle cx="300" cy="385" r="9" fill="none" stroke="#FFC000" stroke-width="1.6"/>
  <rect x="591" y="376" width="18" height="18" rx="3" fill="#548235"/>
  <circle cx="660" cy="385" r="9" fill="none" stroke="#C00000" stroke-width="1.6"/>
  <circle cx="720" cy="385" r="9" fill="none" stroke="#C00000" stroke-width="1.6"/>

  <!-- autopilot-draft (row7 419): 자료○ 연구● 편집● codex○ -->
  <circle cx="300" cy="419" r="9" fill="none" stroke="#FFC000" stroke-width="1.6"/>
  <rect x="411" y="410" width="18" height="18" rx="3" fill="#7a3da0"/>
  <rect x="471" y="410" width="18" height="18" rx="3" fill="#1f8f8f"/>
  <circle cx="720" cy="419" r="9" fill="none" stroke="#C00000" stroke-width="1.6"/>

  <!-- autopilot-apply (row8 453): none (build gate) -->
  <text x="510" y="458" font-size="11" fill="#999" text-anchor="middle" font-style="italic">(build gate · reviewer 없음)</text>

  <!-- autopilot-refine (row9 487): 연구● 편집○ codex○ -->
  <rect x="411" y="478" width="18" height="18" rx="3" fill="#7a3da0"/>
  <circle cx="480" cy="487" r="9" fill="none" stroke="#1f8f8f" stroke-width="1.6"/>
  <circle cx="720" cy="487" r="9" fill="none" stroke="#C00000" stroke-width="1.6"/>

  <!-- autopilot-design (row10 521): 자료● 디자● codex○ -->
  <rect x="291" y="512" width="18" height="18" rx="3" fill="#FFC000"/>
  <rect x="351" y="512" width="18" height="18" rx="3" fill="#c0508f"/>
  <circle cx="720" cy="521" r="9" fill="none" stroke="#C00000" stroke-width="1.6"/>

  <!-- autopilot-ship (row11 555): none -->
  <text x="510" y="560" font-size="11" fill="#999" text-anchor="middle" font-style="italic">(안내만)</text>

  <!-- audit (row12 589): 연구● 편집● -->
  <rect x="411" y="580" width="18" height="18" rx="3" fill="#7a3da0"/>
  <rect x="471" y="580" width="18" height="18" rx="3" fill="#1f8f8f"/>

  <!-- notes (row13 623): none -->
  <text x="510" y="628" font-size="11" fill="#999" text-anchor="middle" font-style="italic">(agent 호출 없음)</text>

  <!-- ===================== QA ladder column ===================== -->
  <!-- separate narrow column x 766..846 -->
  <!-- color intensity ladder: quick 옅음 → adversarial 진한 빨강 -->
  <!-- per-row QA badge -->
  <g font-size="11" fill="#fff" text-anchor="middle">
    <!-- analyze-project: standard -->
    <rect x="766" y="206" width="80" height="18" rx="4" fill="#C00000" opacity="0.45"/><text x="806" y="219" fill="#222">standard</text>
    <!-- analyze-user: adversarial -->
    <rect x="766" y="240" width="80" height="18" rx="4" fill="#C00000" opacity="1.0"/><text x="806" y="253">adversarial</text>
    <!-- research: thorough -->
    <rect x="766" y="274" width="80" height="18" rx="4" fill="#C00000" opacity="0.72"/><text x="806" y="287">thorough</text>
    <!-- spec: standard -->
    <rect x="766" y="308" width="80" height="18" rx="4" fill="#C00000" opacity="0.45"/><text x="806" y="321" fill="#222">standard</text>
    <!-- code: thorough -->
    <rect x="766" y="342" width="80" height="18" rx="4" fill="#C00000" opacity="0.72"/><text x="806" y="355">thorough</text>
    <!-- lab: light -->
    <rect x="766" y="376" width="80" height="18" rx="4" fill="#C00000" opacity="0.22"/><text x="806" y="389" fill="#222">light</text>
    <!-- draft: thorough -->
    <rect x="766" y="410" width="80" height="18" rx="4" fill="#C00000" opacity="0.72"/><text x="806" y="423">thorough</text>
    <!-- apply: build gate -->
    <rect x="766" y="444" width="80" height="18" rx="4" fill="#6E6E6E" opacity="0.30"/><text x="806" y="457" fill="#222">build</text>
    <!-- refine: thorough -->
    <rect x="766" y="478" width="80" height="18" rx="4" fill="#C00000" opacity="0.72"/><text x="806" y="491">thorough</text>
    <!-- design: standard -->
    <rect x="766" y="512" width="80" height="18" rx="4" fill="#C00000" opacity="0.45"/><text x="806" y="525" fill="#222">standard</text>
    <!-- ship: n/a -->
    <rect x="766" y="546" width="80" height="18" rx="4" fill="#6E6E6E" opacity="0.18"/><text x="806" y="559" fill="#222">n/a</text>
    <!-- audit: scope -->
    <rect x="766" y="580" width="80" height="18" rx="4" fill="#6E6E6E" opacity="0.30"/><text x="806" y="593" fill="#222">scope</text>
    <!-- notes: n/a -->
    <rect x="766" y="614" width="80" height="18" rx="4" fill="#6E6E6E" opacity="0.18"/><text x="806" y="627" fill="#222">n/a</text>
  </g>

  <!-- ===================== Legend (right block) ===================== -->
  <g transform="translate(880,206)">
    <rect x="0" y="0" width="262" height="232" rx="8" fill="#fafafa" stroke="#ccc" stroke-width="1" filter="url(#sh)"/>
    <text x="16" y="26" font-size="14" font-weight="bold" fill="#1a1a1a">범례</text>

    <rect x="16" y="40" width="18" height="18" rx="3" fill="#6E6E6E"/>
    <text x="44" y="54" font-size="12" fill="#333">● 자동 호출 (always)</text>

    <circle cx="25" cy="78" r="9" fill="none" stroke="#6E6E6E" stroke-width="1.6"/>
    <text x="44" y="82" font-size="12" fill="#333">○ 옵션/조건부 호출</text>

    <text x="16" y="112" font-size="12" fill="#333" font-weight="bold">QA 강도 사다리</text>
    <rect x="16" y="120" width="30" height="14" fill="#C00000" opacity="0.22"/>
    <rect x="46" y="120" width="30" height="14" fill="#C00000" opacity="0.45"/>
    <rect x="76" y="120" width="30" height="14" fill="#C00000" opacity="0.72"/>
    <rect x="106" y="120" width="30" height="14" fill="#C00000" opacity="1.0"/>
    <text x="16" y="148" font-size="10" fill="#666">light → standard → thorough → adversarial</text>

    <line x1="16" y1="162" x2="246" y2="162" stroke="#ddd"/>
    <text x="16" y="182" font-size="11" fill="#555">* codex = codex-review-team —</text>
    <text x="16" y="198" font-size="11" fill="#555">  frontmatter opus 지만 실제 실행은</text>
    <text x="16" y="214" font-size="11" fill="#555">  외부 <tspan font-weight="bold">Codex GPT-5</tspan>. adversarial 자리만.</text>
  </g>

  <!-- hub annotation -->
  <text x="420" y="662" font-size="11" fill="#C00000" text-anchor="middle" font-weight="bold">↑ hub</text>
  <text x="660" y="662" font-size="11" fill="#C00000" text-anchor="middle" font-weight="bold">↑ hub</text>
  <text x="540" y="686" font-size="12" fill="#555" text-anchor="middle">연구팀·품질관리팀이 호출 hub — 가장 많은 skill 이 의존 (열 음영)</text>
</svg>
