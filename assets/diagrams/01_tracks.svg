<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" width="100%"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif">

  <!-- ═══════════════════════════════════════════════════════
       01_tracks.svg — 도메인별 트랙 (4 레인)
       GitHub light/dark 안전: 모든 텍스트는 채움 위에서 읽힘
       ═══════════════════════════════════════════════════════ -->

  <defs>
    <!-- 화살표 마커 — 실선 -->
    <marker id="arrow-solid" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555566"/>
    </marker>
    <!-- 화살표 마커 — 점선 -->
    <marker id="arrow-dash" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8888aa"/>
    </marker>

    <!-- 레인 배경 그라디언트 (매우 옅게) -->
    <linearGradient id="lane-doc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#faf7ff"/>
    </linearGradient>
    <linearGradient id="lane-exp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0fff4"/>
      <stop offset="100%" stop-color="#f5fff0"/>
    </linearGradient>
    <linearGradient id="lane-app" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#fffbf0"/>
    </linearGradient>
    <linearGradient id="lane-lib" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0fff8"/>
      <stop offset="100%" stop-color="#f0fffa"/>
    </linearGradient>

    <!-- 드롭 섀도 (노드용) -->
    <filter id="shadow" x="-5%" y="-10%" width="115%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- ─────────────────────────────────────────
       배경
       ───────────────────────────────────────── -->
  <rect width="1100" height="500" rx="12" fill="#1e1e2e" opacity="0"/>
  <!-- GitHub 렌더링에서 배경 투명 처리 — 노드 자체로 dark/light 대응 -->

  <!-- ─────────────────────────────────────────
       레인 레이블 영역
       ───────────────────────────────────────── -->

  <!-- 레인 1: 문서 작업 (y=40~155) -->
  <rect x="8" y="40" width="1084" height="108" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="22" y="68" font-size="12.5" font-weight="700" fill="#3730a3">📄</text>
  <text x="22" y="84" font-size="11" font-weight="700" fill="#3730a3">문서</text>
  <text x="22" y="98" font-size="11" font-weight="700" fill="#3730a3">작업</text>

  <!-- 레인 2: 연구·실험 (y=163~278) -->
  <rect x="8" y="163" width="1084" height="108" rx="10" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.2"/>
  <text x="22" y="191" font-size="12.5" font-weight="700" fill="#065f46">🔬</text>
  <text x="22" y="207" font-size="11" font-weight="700" fill="#065f46">연구·</text>
  <text x="22" y="221" font-size="11" font-weight="700" fill="#065f46">실험</text>

  <!-- 레인 3: 앱 개발 (y=286~401) -->
  <rect x="8" y="286" width="1084" height="108" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.2"/>
  <text x="22" y="314" font-size="12.5" font-weight="700" fill="#9a3412">💻</text>
  <text x="22" y="330" font-size="11" font-weight="700" fill="#9a3412">앱</text>
  <text x="22" y="344" font-size="11" font-weight="700" fill="#9a3412">개발</text>

  <!-- 레인 4: 라이브러리·CLI (y=409~470) -->
  <rect x="8" y="409" width="1084" height="80" rx="10" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.2"/>
  <text x="22" y="433" font-size="12.5" font-weight="700" fill="#065f46">📦</text>
  <text x="22" y="449" font-size="11" font-weight="700" fill="#065f46">라이브</text>
  <text x="22" y="463" font-size="11" font-weight="700" fill="#065f46">러리</text>

  <!-- ─────────────────────────────────────────
       색상 팔레트 정의 (카테고리별)
       analyze-project/research = 파랑 #3b5bdb / #d0e4ff
