       y 중앙: 94
       ═══════════════════════════════════════ -->

  <!-- 노드 1-A: analyze-project / autopilot-research (파랑) -->
  <g filter="url(#shadow)">
    <rect x="68" y="60" width="155" height="68" rx="8" fill="#3b5bdb" stroke="#2f4ac0" stroke-width="1.5"/>
  </g>
  <text x="146" y="88" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">analyze-project /</text>
  <text x="146" y="103" font-size="10" font-weight="600" fill="#dbeafe" text-anchor="middle">autopilot-research</text>

  <!-- 화살표 1-A → 1-B -->
  <line x1="224" y1="94" x2="258" y2="94" stroke="#555566" stroke-width="1.8" marker-end="url(#arrow-solid)"/>

  <!-- 노드 1-B: autopilot-draft (주황) -->
  <g filter="url(#shadow)">
    <rect x="260" y="60" width="138" height="68" rx="8" fill="#e67700" stroke="#c96200" stroke-width="1.5"/>
