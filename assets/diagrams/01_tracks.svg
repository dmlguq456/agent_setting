  <text x="562" y="70" font-size="9" font-weight="700" fill="#4a044e" text-anchor="middle">↻</text>

  <!-- 화살표 1-C → 1-D -->
  <line x1="574" y1="94" x2="608" y2="94" stroke="#555566" stroke-width="1.8" marker-end="url(#arrow-solid)"/>

