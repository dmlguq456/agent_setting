<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <filter id="bsh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1.5" dy="2.2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="8.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3 L0,6 L2.6,3 z" fill="#444"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="42" font-size="22" font-weight="bold" fill="#1a1a1a">G1 · 트랙 파이프라인 — 어떤 작업이 어느 트랙으로 흐르나</text>
  <text x="40" y="65" font-size="13" fill="#555">레인 1개 = 트랙 1개. 레인 안에서만 좌→우 단방향. 레인 간 hand-off 는 우측 배지로 (레인 가로지르는 화살표 없음)</text>

  <!-- lane geometry: left label col x40..210 ; pipeline x230..1080 ; badge col x1090..1270 -->
  <!-- 9 lanes, top y=88, lane height 70, gap 4 -->

  <!-- ===== lane backgrounds (alternating tint by track hue) ===== -->
  <!-- 점검 gray / 사용자분석 red / 연구 green / 실험 light-green / 청사진 blue / 코드 teal / 디자인 pink / 문서 orange / 정정 plum -->
  <g opacity="0.10">
    <rect x="36" y="88"  width="1240" height="66" rx="6" fill="#6E6E6E"/>
    <rect x="36" y="158" width="1240" height="66" rx="6" fill="#C00000"/>
    <rect x="36" y="228" width="1240" height="66" rx="6" fill="#548235"/>
    <rect x="36" y="298" width="1240" height="66" rx="6" fill="#70AD47"/>
    <rect x="36" y="368" width="1240" height="66" rx="6" fill="#4472C4"/>
    <rect x="36" y="438" width="1240" height="66" rx="6" fill="#2f9090"/>
    <rect x="36" y="508" width="1240" height="66" rx="6" fill="#c0508f"/>
    <rect x="36" y="578" width="1240" height="66" rx="6" fill="#ED7D31"/>
    <rect x="36" y="648" width="1240" height="66" rx="6" fill="#8a4fa0"/>
  </g>

  <!-- vertical divider between pipeline and badge -->
  <line x1="1082" y1="84" x2="1082" y2="718" stroke="#ccc" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="1180" y="80" font-size="11" fill="#888" text-anchor="middle" font-style="italic" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">→ 트랙 간 hand-off</text>

  <!-- ===== lane labels (left) ===== -->
  <g font-size="14" font-weight="bold">
    <text x="52" y="126" fill="#5a5a5a">점검·입력</text>
    <text x="52" y="196" fill="#C00000">사용자분석</text>
    <text x="52" y="266" fill="#548235">연구</text>
    <text x="52" y="336" fill="#5a7d34">실험</text>
    <text x="52" y="406" fill="#4472C4">청사진·앱</text>
    <text x="52" y="476" fill="#2f9090">코드</text>
    <text x="52" y="546" fill="#c0508f">디자인</text>
    <text x="52" y="616" fill="#C55A11">문서</text>
    <text x="52" y="686" fill="#8a4fa0">정정</text>
  </g>

  <!-- ============ skill boxes : white fill + role-color stroke + shadow ============ -->
  <!-- box helper: rounded rect rx7, white fill, 2.2pt colored stroke, mono label -->
  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="12.5" text-anchor="middle">

    <!-- 점검 lane (y center 121) : analyze-project | audit | notes (parallel, no internal pipe) -->
    <rect x="230" y="104" width="160" height="34" rx="7" fill="#fff" stroke="#6E6E6E" stroke-width="1.0" filter="url(#bsh)"/>
    <text x="310" y="126" fill="#333">analyze-project</text>
    <rect x="410" y="104" width="100" height="34" rx="7" fill="#fff" stroke="#6E6E6E" stroke-width="1.0" filter="url(#bsh)"/>
    <text x="460" y="126" fill="#333">audit</text>
    <rect x="530" y="104" width="100" height="34" rx="7" fill="#fff" stroke="#6E6E6E" stroke-width="1.0" filter="url(#bsh)"/>
    <text x="580" y="126" fill="#333">notes</text>

    <!-- 사용자분석 lane (y center 191): analyze-user (single, adversarial = red dashed) -->
    <rect x="230" y="174" width="170" height="34" rx="7" fill="#fff" stroke="#C00000" stroke-width="1.0" stroke-dasharray="4 2.5" filter="url(#bsh)"/>
    <text x="315" y="196" fill="#C00000" font-weight="bold">analyze-user</text>

    <!-- 연구 lane (y center 261): autopilot-research (entry, ceremony 큰 = red dashed) -->
    <rect x="230" y="244" width="190" height="34" rx="7" fill="#fff" stroke="#C00000" stroke-width="1.0" stroke-dasharray="4 2.5" filter="url(#bsh)"/>
    <text x="325" y="266" fill="#548235" font-weight="bold">autopilot-research</text>
    <text x="455" y="266" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="11.5" fill="#548235" text-anchor="start">search → analyze → report</text>

    <!-- 실험 lane (y center 331): autopilot-lab -->
    <rect x="230" y="314" width="160" height="34" rx="7" fill="#fff" stroke="#70AD47" stroke-width="1.0" filter="url(#bsh)"/>
    <text x="310" y="336" fill="#5a7d34">autopilot-lab</text>
    <text x="420" y="336" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="11.5" fill="#5a7d34" text-anchor="start">scaffold → run → summary (light QA)</text>

    <!-- 청사진 lane (y center 401): autopilot-spec → autopilot-ship -->
    <rect x="230" y="384" width="160" height="34" rx="7" fill="#fff" stroke="#4472C4" stroke-width="1.0" filter="url(#bsh)"/>
    <text x="310" y="406" fill="#4472C4">autopilot-spec</text>
    <!-- orthogonal single-direction arrow inside lane -->
    <line x1="390" y1="401" x2="470" y2="401" stroke="#444" stroke-width="0.9" marker-end="url(#arr)"/>
    <rect x="478" y="384" width="160" height="34" rx="7" fill="#fff" stroke="#4472C4" stroke-width="1.0" filter="url(#bsh)"/>
    <text x="558" y="406" fill="#4472C4">autopilot-ship</text>
    <text x="660" y="406" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="11.5" fill="#4472C4" text-anchor="start">PRD → 02_design → deploy</text>

    <!-- 코드 lane (y center 471): autopilot-code (red dashed) -->
    <rect x="230" y="454" width="170" height="34" rx="7" fill="#fff" stroke="#C00000" stroke-width="1.0" stroke-dasharray="4 2.5" filter="url(#bsh)"/>
    <text x="315" y="476" fill="#2f9090" font-weight="bold">autopilot-code</text>
    <text x="420" y="476" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="11.5" fill="#2f9090" text-anchor="start">plan → refine → execute → test → report</text>

    <!-- 디자인 lane (y center 541): autopilot-design -->
    <rect x="230" y="524" width="170" height="34" rx="7" fill="#fff" stroke="#c0508f" stroke-width="1.0" filter="url(#bsh)"/>
    <text x="315" y="546" fill="#c0508f">autopilot-design</text>
    <text x="420" y="546" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="11.5" fill="#c0508f" text-anchor="start">Phase 0 init → refs → tokens → components → review → handoff</text>

    <!-- 문서 lane (y center 611): autopilot-draft (red dashed) -->
    <rect x="230" y="594" width="170" height="34" rx="7" fill="#fff" stroke="#C00000" stroke-width="1.0" stroke-dasharray="4 2.5" filter="url(#bsh)"/>
    <text x="315" y="616" fill="#C55A11" font-weight="bold">autopilot-draft</text>
    <text x="420" y="616" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="11.5" fill="#C55A11" text-anchor="start">clarify → strategy → draft → refine → finalize</text>

    <!-- 정정 lane (y center 681): autopilot-refine | autopilot-apply (parallel, refine red dashed) -->
    <rect x="230" y="664" width="170" height="34" rx="7" fill="#fff" stroke="#C00000" stroke-width="1.0" stroke-dasharray="4 2.5" filter="url(#bsh)"/>
    <text x="315" y="686" fill="#8a4fa0" font-weight="bold">autopilot-refine</text>
    <rect x="420" y="664" width="170" height="34" rx="7" fill="#fff" stroke="#C00000" stroke-width="1.0" stroke-dasharray="4 2.5" filter="url(#bsh)"/>
    <text x="505" y="686" fill="#8a4fa0" font-weight="bold">autopilot-apply</text>
  </g>

  <!-- ============ right-edge hand-off badges (text only, no cross-lane arrows) ============ -->
  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="11" text-anchor="start">
    <!-- 점검 -->
    <rect x="1092" y="106" width="178" height="30" rx="5" fill="#fff" stroke="#6E6E6E" stroke-width="1.0"/>
    <text x="1100" y="119" fill="#555">선행 입력 →</text>
    <text x="1100" y="132" fill="#555">연구·문서·코드 트랙</text>
    <!-- 사용자분석 -->
    <rect x="1092" y="176" width="178" height="30" rx="5" fill="#fff" stroke="#C00000" stroke-width="1.0"/>
    <text x="1100" y="189" fill="#C00000">user_profile →</text>
    <text x="1100" y="202" fill="#C00000">전 agent default 참조</text>
    <!-- 연구 -->
    <rect x="1092" y="246" width="178" height="30" rx="5" fill="#fff" stroke="#548235" stroke-width="1.0"/>
    <text x="1100" y="259" fill="#548235">fan-out →</text>
    <text x="1100" y="272" fill="#548235">문서·코드·청사진 3트랙</text>
    <!-- 실험 -->
    <rect x="1092" y="316" width="178" height="30" rx="5" fill="#fff" stroke="#70AD47" stroke-width="1.0"/>
    <text x="1100" y="329" fill="#5a7d34">졸업 →</text>
    <text x="1100" y="342" fill="#5a7d34">코드 트랙 (라이브러리화)</text>
    <!-- 청사진 -->
    <rect x="1092" y="386" width="178" height="30" rx="5" fill="#fff" stroke="#4472C4" stroke-width="1.0"/>
    <text x="1100" y="399" fill="#4472C4">→ 코드 트랙 (구현)</text>
    <text x="1100" y="412" fill="#4472C4">→ 디자인 트랙 (UI)</text>
    <!-- 코드 -->
    <rect x="1092" y="456" width="178" height="30" rx="5" fill="#fff" stroke="#2f9090" stroke-width="1.0"/>
    <text x="1100" y="469" fill="#2f9090">← 실험·청사진 입력</text>
    <text x="1100" y="482" fill="#2f9090">specs/&lt;name&gt;/ 자동감지</text>
    <!-- 디자인 -->
    <rect x="1092" y="526" width="178" height="30" rx="5" fill="#fff" stroke="#c0508f" stroke-width="1.0"/>
    <text x="1100" y="539" fill="#c0508f">← 청사진 Phase 2</text>
    <text x="1100" y="552" fill="#c0508f">→ 프론트 dev</text>
    <!-- 문서 -->
    <rect x="1092" y="596" width="178" height="30" rx="5" fill="#fff" stroke="#ED7D31" stroke-width="1.0"/>
    <text x="1100" y="609" fill="#C55A11">cheatsheet →</text>
    <text x="1100" y="622" fill="#C55A11">정정 트랙 (apply)</text>
    <!-- 정정 -->
    <rect x="1092" y="666" width="178" height="30" rx="5" fill="#fff" stroke="#8a4fa0" stroke-width="1.0"/>
    <text x="1100" y="679" fill="#8a4fa0">← 문서·연구 산출물</text>
    <text x="1100" y="692" fill="#8a4fa0">대상 in-place 수정</text>
  </g>

  <!-- bottom legend -->
  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="11.5">
    <rect x="40" y="728" width="22" height="14" rx="4" fill="#fff" stroke="#C00000" stroke-width="0.9" stroke-dasharray="5 3"/>
    <text x="70" y="739" fill="#444">빨강 점선 = ceremony 큰 6 (옵션 자동구성+컨펌): research / code / draft / refine / apply / analyze-user</text>
    <rect x="700" y="728" width="22" height="14" rx="4" fill="#fff" stroke="#6E6E6E" stroke-width="0.9"/>
    <text x="730" y="739" fill="#444">실선 회색 = 작은 즉시 / 그 외 트랙. 레인 안 화살표만 직교 단방향.</text>
  </g>
</svg>
