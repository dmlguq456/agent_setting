         주황 draft:   #b45309 fill / white text
         회색 audit:   #334155 fill / white text
         보라 refine:  #5b21b6 fill / white text
         청록 profile: #0e7490 fill / white text
       ══════════════════════════════════ -->

  <!-- F. analyze-user (AU) -->
