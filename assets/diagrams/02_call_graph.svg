<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 680" width="100%"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif">

  <!-- ═══════════════════════════════════════════════════════
       02_call_graph.svg — 전체 호출 그래프 (A→F 6 카테고리)
       레이아웃: 좌→우 컬럼 배치
         Col 0 (x≈30):  F. 사용자 프로필
         Col 1 (x≈180): A. 사전 조사
         Col 2 (x≈430): B. 코드 영역 (2열 분리)
         Col 3 (x≈730): C. 문서  /  D. 점검  /  E. 정정
       ═══════════════════════════════════════════════════════ -->

  <defs>
    <!-- 실선 화살표 -->
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <!-- 점선 화살표 -->
    <marker id="arr-d" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>

    <!-- 섀도 필터 -->
    <filter id="sh" x="-8%" y="-12%" width="120%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#00000018"/>
    </filter>

    <!-- 그룹 박스 색 -->
    <!-- A 파랑 zone: #dbeafe bg / #93c5fd border -->
    <!-- B 초록 zone: #dcfce7 bg / #86efac border -->
    <!-- C 주황 zone: #fef3c7 bg / #fcd34d border -->
    <!-- D 회색 zone: #f1f5f9 bg / #cbd5e1 border -->
    <!-- E 보라 zone: #ede9fe bg / #c4b5fd border -->
    <!-- F 청록 zone: #cffafe bg / #67e8f9 border -->
  </defs>

  <!-- ══════════════ 그룹 박스 ══════════════ -->

  <!-- F. 사용자 프로필 (청록) -->
  <rect x="12" y="260" width="152" height="160" rx="10"
        fill="#cffafe" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="88" y="280" font-size="10.5" font-weight="700" fill="#0e7490" text-anchor="middle">F. 사용자 프로필</text>
  <text x="88" y="293" font-size="9" fill="#0e7490" text-anchor="middle">(cross-project)</text>

  <!-- A. 사전 조사 (파랑) -->
  <rect x="180" y="130" width="200" height="200" rx="10"
        fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="280" y="152" font-size="10.5" font-weight="700" fill="#1e40af" text-anchor="middle">A. 사전 조사</text>

  <!-- B. 코드 영역 (초록) -->
  <rect x="400" y="30" width="330" height="480" rx="10"
        fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="565" y="52" font-size="10.5" font-weight="700" fill="#15803d" text-anchor="middle">B. 코드 영역</text>

  <!-- C. 문서 (주황) -->
  <rect x="755" y="130" width="182" height="100" rx="10"
        fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="846" y="152" font-size="10.5" font-weight="700" fill="#92400e" text-anchor="middle">C. 문서</text>

  <!-- D. 점검 (회색) -->
  <rect x="755" y="260" width="182" height="100" rx="10"
        fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="846" y="282" font-size="10.5" font-weight="700" fill="#475569" text-anchor="middle">D. 점검</text>

  <!-- E. 정정 (보라) -->
  <rect x="755" y="390" width="182" height="160" rx="10"
        fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="846" y="412" font-size="10.5" font-weight="700" fill="#5b21b6" text-anchor="middle">E. 정정</text>

