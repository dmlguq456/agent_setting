<script>
(function () {
  "use strict";
  var DATA = JSON.parse(document.getElementById("hub-data").textContent);

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    attrs = attrs || {};
    for (var key in attrs) {
      if (!Object.prototype.hasOwnProperty.call(attrs, key)) continue;
      if (key === "class") node.className = attrs[key];
      else if (key === "text") node.textContent = attrs[key];
      else node.setAttribute(key, attrs[key]);
    }
    (children || []).forEach(function (child) {
      if (child === null || child === undefined) return;
      node.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
    });
    return node;
  }

  function orEmpty(value) {
    if (Array.isArray(value)) return value.length ? value.join(", ") : "—";
    if (value === null || value === undefined || value === "") return "—";
    return String(value);
  }

  function badgeRow(values) {
    var row = el("div", { class: "badge-row" }, []);
    (values || []).forEach(function (value) {
      row.appendChild(el("span", { class: "badge", text: value }, []));
    });
    return row;
  }

  function fieldBlock(label, valueNode) {
    var wrap = document.createDocumentFragment();
    wrap.appendChild(el("div", { class: "field-label", text: label }, []));
    wrap.appendChild(valueNode);
    return wrap;
  }

  function textField(label, value) {
    return fieldBlock(label, el("div", { class: "field-value", text: orEmpty(value) }, []));
  }

  function codeField(label, value) {
    var code = el("code", { text: orEmpty(value) }, []);
    return fieldBlock(label, el("div", { class: "field-value" }, [code]));
  }

  // Generic per-item detail panel: dumps every field of the clicked item so no
  // per-kind field list needs to be hardcoded here.
  var panel = document.getElementById("detail-panel");
  function hideDetail() {
    panel.classList.remove("open");
    panel.setAttribute("aria-hidden", "true");
  }
  function showDetail(kindLabel, item) {
    while (panel.firstChild) panel.removeChild(panel.firstChild);
    panel.appendChild(el("button", { id: "detail-close", type: "button", text: "닫기" }, []));
    panel.appendChild(el("h3", { text: item.name || item.id || item.slug || kindLabel }, []));
    panel.appendChild(el("div", { class: "hub-meta", text: kindLabel }, []));
    var table = el("table", {}, []);
    Object.keys(item).forEach(function (key) {
      var raw = item[key];
      var value = Array.isArray(raw) ? raw.join(", ") : (raw && typeof raw === "object" ? JSON.stringify(raw) : String(raw));
      var row = el("tr", {}, [
        el("th", { text: key }, []),
        el("td", { text: value === "" ? "—" : value }, []),
      ]);
      table.appendChild(row);
    });
    panel.appendChild(table);
    panel.classList.add("open");
    panel.setAttribute("aria-hidden", "false");
    document.getElementById("detail-close").addEventListener("click", hideDetail);
  }

  function groupInOrder(list, keyFn) {
    var order = [];
    var buckets = {};
    list.forEach(function (item) {
      var key = keyFn(item);
      if (!Object.prototype.hasOwnProperty.call(buckets, key)) {
        buckets[key] = [];
        order.push(key);
      }
      buckets[key].push(item);
    });
    return order.map(function (key) { return [key, buckets[key]]; });
  }

  function renderMeta() {
    var meta = document.getElementById("hub-meta");
    var reg = DATA.topology_registry || {};
    var parts = [
      "manifest_version " + orEmpty(DATA.manifest_version),
      "skills " + DATA.skills.length,
      "agents " + DATA.agents.length,
      "hooks " + DATA.hooks.length,
      "loops " + DATA.loops.length,
      "tracks " + DATA.tracks.length,
    ];
    meta.appendChild(el("div", { text: DATA.generated_from }, []));
    meta.appendChild(el("div", { text: parts.join(" · ") }, []));
  }

  function renderTracks(container) {
    container.appendChild(el("h2", { text: "트랙" }, []));
    var skillBySlug = {};
    DATA.skills.forEach(function (skill) { skillBySlug[skill.slug] = skill; });
    DATA.tracks.forEach(function (track) {
      var section = el("div", { class: "track" }, []);
      section.style.setProperty("--track-color", "var(" + track.color_token + ")");
      var titleRow = el("div", { class: "track-title" }, [
        el("h3", { text: track.label }, []),
        el("code", { text: track.id }, []),
      ]);
      section.appendChild(titleRow);
      var flow = el("div", { class: "flow" }, []);
      track.steps.forEach(function (slug, index) {
        var skill = skillBySlug[slug];
        var node = el("button", { type: "button", class: "flow-node", text: skill ? skill.name : slug }, []);
        node.addEventListener("click", function () {
          showDetail("스킬 · " + track.label, skill || { slug: slug });
        });
        flow.appendChild(node);
        if (index < track.steps.length - 1) {
          flow.appendChild(el("span", { class: "flow-arrow", text: "→" }, []));
        }
      });
      section.appendChild(flow);
      if (track.gates && track.gates.length) {
        section.appendChild(el("div", { class: "track-gates", text: "게이트: " + track.gates.join(", ") }, []));
      }
      container.appendChild(section);
    });
  }

  function renderAgents(container) {
    container.appendChild(el("h2", { text: "에이전트" }, []));
    var grid = el("div", { class: "card-grid" }, []);
    DATA.agents.forEach(function (agent) {
      var card = el("button", { type: "button", class: "mini-card" }, [
        el("div", { class: "mini-title", text: agent.name }, []),
        el("div", { class: "mini-blurb", text: agent.blurb }, []),
        badgeRow(agent.modes),
      ]);
      card.addEventListener("click", function () { showDetail("에이전트", agent); });
      grid.appendChild(card);
    });
    container.appendChild(grid);
  }

  function renderHooks(container) {
    container.appendChild(el("h2", { text: "훅" }, []));
    groupInOrder(DATA.hooks, function (hook) { return hook.event; }).forEach(function (pair) {
      var event = pair[0], hooks = pair[1];
      var group = el("div", { class: "hook-event-group" }, [el("h3", { text: event }, [])]);
      var grid = el("div", { class: "card-grid" }, []);
      hooks.forEach(function (hook) {
        var badges = [hook.mono];
        if (hook.hard_block) badges.push("hard_block");
        var card = el("button", { type: "button", class: "mini-card" }, [
          el("div", { class: "mini-title", text: hook.name }, []),
          badgeRow(badges),
        ]);
        card.addEventListener("click", function () { showDetail("훅", hook); });
        grid.appendChild(card);
      });
      group.appendChild(grid);
      container.appendChild(group);
    });
  }

  function renderLoops(container) {
    container.appendChild(el("h2", { text: "루프" }, []));
    var grid = el("div", { class: "card-grid" }, []);
    DATA.loops.forEach(function (loop) {
      var card = el("button", { type: "button", class: "mini-card" }, [
        el("div", { class: "mini-title", text: loop.name }, []),
        el("div", { class: "mini-blurb", text: loop.blurb }, []),
        badgeRow([loop.type, loop.layer].filter(Boolean)),
      ]);
      card.addEventListener("click", function () { showDetail("루프", loop); });
      grid.appendChild(card);
    });
    container.appendChild(grid);
  }

  function renderRegistry(container) {
    container.appendChild(el("h2", { text: "토폴로지 레지스트리" }, []));
    var reg = DATA.topology_registry || {};
    var strip = el("div", { class: "stat-strip" }, []);
    var stats = [
      ["출처", reg.source],
      ["다이제스트", reg.digest],
      ["역량", reg.capabilities],
      ["레시피", reg.recipes],
    ];
    stats.forEach(function (pair) {
      strip.appendChild(el("span", { class: "stat-chip", text: pair[0] + ": " + orEmpty(pair[1]) }, []));
    });
    container.appendChild(strip);
  }

  function renderMap() {
    var container = document.getElementById("view-map");
    renderTracks(container);
    renderAgents(container);
    renderHooks(container);
    renderLoops(container);
    renderRegistry(container);
  }

  function renderCatalog() {
    var container = document.getElementById("view-catalog");
    groupInOrder(DATA.skills, function (skill) { return skill.group; }).forEach(function (pair) {
      var group = pair[0], skills = pair[1];
      var block = el("div", { class: "group-block" }, [
        el("div", { class: "group-heading" }, ["그룹: ", el("code", { text: group }, [])]),
      ]);
      skills.forEach(function (skill) {
        var detail = el("div", { class: "skill-card-detail", hidden: "hidden" }, [
          textField("패밀리", skill.fam),
          textField("호출 방식", skill.invocation_class),
          codeField("슬러그", skill.slug),
        ]);
        var toggle = el("button", { type: "button", class: "skill-card-toggle", "aria-expanded": "false" }, [
          el("span", { class: "skill-card-name", text: skill.name }, []),
          el("span", { class: "skill-card-slug", text: skill.slug }, []),
          badgeRow(skill.modes),
          textField("설명", skill.blurb),
          textField("사용 시점", skill.use_when),
          textField("제외 대상", skill.not_for),
          codeField("인자 힌트", skill.argument_hint),
        ]);
        toggle.addEventListener("click", function () {
          var expanded = toggle.getAttribute("aria-expanded") === "true";
          toggle.setAttribute("aria-expanded", String(!expanded));
          if (expanded) detail.setAttribute("hidden", "hidden");
          else detail.removeAttribute("hidden");
        });
        var card = el("div", { class: "skill-card" }, [toggle, detail]);
        block.appendChild(card);
      });
      container.appendChild(block);
    });
  }

  function activateTab(name) {
    var mapView = document.getElementById("view-map");
    var catalogView = document.getElementById("view-catalog");
    var mapTab = document.getElementById("tab-map");
    var catalogTab = document.getElementById("tab-catalog");
    var showMap = name === "map";
    mapView.hidden = !showMap;
    catalogView.hidden = showMap;
    mapTab.setAttribute("aria-pressed", String(showMap));
    catalogTab.setAttribute("aria-pressed", String(!showMap));
  }

  document.getElementById("tab-map").addEventListener("click", function () { activateTab("map"); });
  document.getElementById("tab-catalog").addEventListener("click", function () { activateTab("catalog"); });

  renderMeta();
  renderMap();
  renderCatalog();
})();
