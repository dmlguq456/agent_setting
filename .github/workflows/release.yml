name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Plan release
        id: plan
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_HEAD: ${{ github.sha }}
        run: |
          if [ "$REF_TYPE" = tag ]; then
            python3 tools/release/plan.py validate-version "$REF_NAME"
            {
              echo "release=true"
              echo "mode=tag"
              echo "base_tag="
              echo "head=$RELEASE_HEAD"
              echo "bump=manual"
              echo "version=$REF_NAME"
              echo "reason=validated-tag"
            } >> "$GITHUB_OUTPUT"
          else
            python3 tools/release/plan.py plan \
              --repo . \
              --head "$RELEASE_HEAD" \
              --format github >> "$GITHUB_OUTPUT"
            echo "mode=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Report skipped release
        if: steps.plan.outputs.release != 'true'
        env:
          BASE_TAG: ${{ steps.plan.outputs.base_tag }}
          REASON: ${{ steps.plan.outputs.reason }}
        run: |
          {
            echo "## Release skipped"
            echo
            echo "No release-relevant changes exist after \`$BASE_TAG\` (\`$REASON\`)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate release inputs
        if: steps.plan.outputs.release == 'true'
        run: |
          python3 -m py_compile \
            tools/release/plan.py \
            tools/install/build-release.py \
            tools/install/distribution.py \
            tools/install/installer.py
          python3 tools/generate.py --check
          ./tools/release/plan.test.sh
          ./tools/install/release-lifecycle.test.sh
          ./tools/install/profile-activation.test.sh
          ./tools/install/runtime-activation.test.sh
          ./tools/install/extension-lifecycle.test.sh
          ./tools/check-adaptation-boundary.sh

      - name: Build deterministic release assets
        if: steps.plan.outputs.release == 'true'
        env:
          RELEASE_TAG: ${{ steps.plan.outputs.version }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_REF: ${{ github.sha }}
        run: |
          python3 tools/install/build-release.py \
            --version "$RELEASE_TAG" \
            --repository "$RELEASE_REPOSITORY" \
            --ref "$RELEASE_REF" \
            --output dist

      - name: Create the planned tag
        if: steps.plan.outputs.release == 'true' && steps.plan.outputs.mode == 'auto'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.plan.outputs.version }}
          RELEASE_HEAD: ${{ github.sha }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi
          tag_object=$(
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/tags" \
              -f tag="$RELEASE_TAG" \
              -f message="Agent Harness $RELEASE_TAG" \
              -f object="$RELEASE_HEAD" \
              -f type=commit \
              --jq .sha
          )
          gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/$RELEASE_TAG" \
            -f sha="$tag_object"

      - name: Publish the verified release
        if: steps.plan.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.plan.outputs.version }}
        run: |
          set --
          case "$RELEASE_TAG" in
            *-*) set -- --prerelease ;;
          esac
          gh release create "$RELEASE_TAG" \
            dist/agent-harness.tar.gz \
            dist/agent-harness.tar.gz.sha256 \
            dist/install.sh \
            dist/install.sh.sha256 \
            --verify-tag \
            --generate-notes \
            --title "$RELEASE_TAG" \
            "$@"

      - name: Summarize release
        if: steps.plan.outputs.release == 'true'
        env:
          BASE_TAG: ${{ steps.plan.outputs.base_tag }}
          BUMP: ${{ steps.plan.outputs.bump }}
          RELEASE_TAG: ${{ steps.plan.outputs.version }}
          REASON: ${{ steps.plan.outputs.reason }}
        run: |
          {
            echo "## Released \`$RELEASE_TAG\`"
            echo
            echo "- Previous stable: \`${BASE_TAG:-manual tag}\`"
            echo "- Bump: \`$BUMP\`"
            echo "- Reason: \`$REASON\`"
          } >> "$GITHUB_STEP_SUMMARY"
