name: Checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  adaptation-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify generated projections
        run: python3 tools/generate.py --check

      - name: Verify adaptation boundary
        run: ./tools/check-adaptation-boundary.sh

      - name: Verify model-config single source
        run: python3 tools/check-model-config.py

      - name: Verify unit-catalog contract
        run: python3 tools/check-unit-config.py
